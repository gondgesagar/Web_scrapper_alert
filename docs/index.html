<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Property Auction Listings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-brand">
          <span class="brand-icon" aria-hidden="true">🏠</span>
          <div>
            <h1>Property Auctions</h1>
            <p class="brand-tagline">Maharashtra bank &amp; e-auction listings</p>
          </div>
        </div>
        <div class="topbar-stats">
          <div class="stat-pill">
            <span class="stat-pill-label">Total</span>
            <span id="totalCount" class="stat-pill-value">0</span>
          </div>
          <div class="stat-pill stat-pill--accent">
            <span class="stat-pill-label">Showing</span>
            <span id="filteredCount" class="stat-pill-value">0</span>
          </div>
        </div>
        <div class="topbar-actions">
          <p class="last-updated">Updated <span id="lastFetch">—</span></p>
          <button id="refreshBtn" type="button" class="btn btn-primary">Refresh</button>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <h2>Filters</h2>
            <button id="clearBtn" type="button" class="btn btn-ghost btn-sm">Clear all</button>
          </div>

          <div class="filter-group filter-group--search">
            <label for="searchInput">Search listings</label>
            <input
              id="searchInput"
              type="search"
              placeholder="Address, bank, city, details…"
              autocomplete="off"
            />
          </div>

          <fieldset class="filter-group">
            <legend>City</legend>
            <div class="filter-field">
              <label for="cityFilter">City</label>
              <select id="cityFilter"></select>
            </div>
          </fieldset>

          <fieldset class="filter-group">
            <legend>Property</legend>
            <div class="filter-field">
              <label for="sourceFilter">Source</label>
              <select id="sourceFilter"></select>
            </div>
            <div class="filter-field">
              <label for="typeFilter">Type</label>
              <select id="typeFilter"></select>
            </div>
            <div class="filter-field">
              <label for="bankFilter">Bank</label>
              <select id="bankFilter"></select>
            </div>
            <label class="filter-check">
              <input id="photoOnly" type="checkbox" />
              <span>Only with photos</span>
            </label>
          </fieldset>

          <fieldset class="filter-group">
            <legend>Price (₹)</legend>
            <div class="price-row">
              <div class="filter-field">
                <label for="minPrice">Min</label>
                <input id="minPrice" type="number" min="0" step="100000" placeholder="0" />
              </div>
              <div class="filter-field">
                <label for="maxPrice">Max</label>
                <input id="maxPrice" type="number" min="0" step="100000" placeholder="Any" />
              </div>
            </div>
          </fieldset>
        </aside>

        <main class="content">
          <div class="content-toolbar">
            <button id="filtersToggle" type="button" class="btn btn-secondary filters-toggle" aria-expanded="false" aria-controls="sidebar">
              Filters
            </button>
            <div id="activeChips" class="chips" aria-live="polite"></div>
          </div>

          <div id="cards" class="listing-grid"></div>

          <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon" aria-hidden="true">🔍</div>
            <h3>No listings match</h3>
            <p>Try clearing filters or widening your search.</p>
            <button type="button" class="btn btn-secondary" id="emptyClearBtn">Clear filters</button>
          </div>
        </main>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
